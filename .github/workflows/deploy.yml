name: Deploy to GitHub Pages

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Pages
        uses: actions/configure-pages@v4
        
      - name: Build static site
        run: |
          # Create a build directory
          mkdir -p _site
          
          # Copy all HTML, CSS, JS, and asset files to _site
          cp -r *.html _site/ 2>/dev/null || echo "No HTML files found"
          cp -r *.css _site/ 2>/dev/null || echo "No CSS files found"
          cp -r *.js _site/ 2>/dev/null || echo "No JS files found"
          cp -r assets _site/ 2>/dev/null || echo "No assets directory found"
          cp -r images _site/ 2>/dev/null || echo "No images directory found"
          cp -r img _site/ 2>/dev/null || echo "No img directory found"
          
          # Ensure index.html exists
          if [ ! -f "_site/index.html" ]; then
            echo "Error: index.html not found!"
            exit 1
          fi
          
          echo "Build completed successfully"
          ls -la _site/
          
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4